Here's a basic DevOps setup for a multi-stage Docker application using a Dockerfile, docker-compose, K8s manifests, and Helm values. 

### Dockerfile (multi-stage)

```dockerfile
# Stage 1: Build
FROM golang:alpine AS build

WORKDIR /app
COPY go.mod go.sum ./
RUN go mod download

COPY . .

RUN CGO_ENABLED=0 GOOS=linux go build -a -installsuffix cgo -o main .

# Stage 2: Production
FROM alpine:latest

RUN apk --no-cache add ca-certificates

WORKDIR /app

COPY --from=build /app/main .

EXPOSE 8080

CMD ["./main"]
```

### Docker Compose (dev and prod)

`docker-compose.yml`

```yaml
version: '3'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - "RUST_LOG=info"
    environment_dev:
      - "RUST_LOG=debug"
      - "RUST_BACKTRACE=1"
    depends_on:
      - database
    restart: always

  database:
    image: mariadb:latest
    environment:
      - "MYSQL_ROOT_PASSWORD=password"
      - "MYSQL_DATABASE=database"
      - "MYSQL_USER=user"
      - "MYSQL_PASSWORD=password"
    volumes:
      - db-data:/var/lib/mysql
    restart: always

volumes:
  db-data:
```

`docker-compose-dev.yml`

```yaml
