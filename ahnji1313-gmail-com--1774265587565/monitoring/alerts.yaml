**Prometheus Configuration**
```yml
# /etc/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'service'
    static_configs:
      - targets: ['service1:9101', 'service2:9102']

rule_files:
  - '/etc/prometheus/rules/*.yml'
```

